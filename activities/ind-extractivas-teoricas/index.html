<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Extractivas - Teoricas por tema</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Temas">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Extractivas</h1>
            <p>Teoricas por tema</p>
          </div>
        </div>

        <div class="mode-switch" role="tablist" aria-label="Modo de estudio">
          <button class="mode active" data-mode="quiz" role="tab" aria-selected="true" title="Practicar con opciones">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Test
          </button>
          <button class="mode" data-mode="flash" role="tab" aria-selected="false" title="Repasar tarjetas">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h10M7 13h6"/></svg>
            Fichas
          </button>
          <button class="mode" data-mode="write" role="tab" aria-selected="false" title="Responder escrito">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            Oral
          </button>
        </div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="search" placeholder="Buscar tema o concepto" autocomplete="off" />
        </div>

        <nav id="topicList" class="topic-list"></nav>

        <section class="source-box">
          <h2>Base</h2>
          <p>Armada desde tus teoricas, transcripcion maestra y repaso parcial. El progreso se guarda en este navegador.</p>
        </section>
      </aside>

      <section class="study-panel">
        <header class="topbar">
          <div>
            <p id="eyebrow" class="eyebrow">Tema</p>
            <h2 id="topicTitle">Cargando...</h2>
          </div>
          <div class="stats" aria-label="Progreso">
            <div>
              <span id="scorePct">0%</span>
              <small>dominio</small>
            </div>
            <div>
              <span id="answeredCount">0</span>
              <small>resueltas</small>
            </div>
            <button id="resetTopic" class="icon-button" title="Reiniciar tema" aria-label="Reiniciar tema">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
            </button>
          </div>
        </header>

        <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>

        <section class="workspace">
          <div class="prompt-area">
            <div class="topic-meta">
              <span id="questionCounter">1 / 1</span>
              <span id="difficultyTag">Conceptual</span>
            </div>
            <h3 id="questionText"></h3>
            <p id="questionHint" class="hint"></p>
          </div>

          <div id="quizView" class="view active">
            <div id="options" class="options"></div>
          </div>

          <div id="flashView" class="view">
            <button id="revealFlash" class="flash-card">
              <span>Mostrar respuesta</span>
              <strong id="flashAnswer"></strong>
            </button>
          </div>

          <div id="writeView" class="view">
            <textarea id="writtenAnswer" rows="6" placeholder="Respondelo como si fuera oral o desarrollo corto..."></textarea>
            <button id="checkWritten" class="primary-action">Corregir con palabras clave</button>
          </div>

          <section id="feedback" class="feedback" aria-live="polite"></section>
        </section>

        <footer class="controls">
          <button id="prevQuestion" class="secondary-action">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            Anterior
          </button>
          <button id="shuffleTopic" class="secondary-action">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.5a7 7 0 0 0 6.1-3.6l4.8-8.8A7 7 0 0 1 20.5 2H22"/><path d="M2 6h1.5a7 7 0 0 1 6.1 3.6l.9 1.7"/></svg>
            Mezclar
          </button>
          <button id="nextQuestion" class="primary-action">
            Siguiente
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </footer>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
